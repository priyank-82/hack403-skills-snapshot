<!DOCTYPE html>
<html>
<head>
  <title>Test CORS with FastAPI Backend</title>
</head>
<body>
  <h2>Test CORS: Fetch from FastAPI Backend</h2>
  <button onclick="testCORS()">Test Backend</button>
  <pre id="output"></pre>
  <script>
    function testCORS() {
      fetch('http://localhost:8000/', { method: 'GET' })
        .then(response => response.json())
        .then(data => {
          document.getElementById('output').textContent = JSON.stringify(data, null, 2);
        })
        .catch(error => {
          document.getElementById('output').textContent = 'Error: ' + error;
        });
    }
  </script>
</body>
</html>
